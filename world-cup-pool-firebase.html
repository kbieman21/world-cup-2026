<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Family World Cup 2026 Prediction Pool</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background: #f0f8f0; line-height: 1.5; }
        h1 { color: #006400; text-align: center; }
        .tab { display: flex; margin-bottom: 10px; flex-wrap: wrap; }
        .tab button { flex: 1; padding: 14px; font-size: 17px; border: none; background: #ddd; margin: 2px; }
        .tab button.active { background: #006400; color: white; }
        .content { display: none; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content.active { display: block; }
        .match { border: 1px solid #ccc; padding: 12px; margin: 10px 0; border-radius: 8px; background: #fafafa; }
        select, input { padding: 8px; font-size: 16px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px 20px; font-size: 16px; background: #006400; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px 2px; }
        .instructions { background: #e6ffe6; padding: 12px; border-radius: 5px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background: #006400; color: white; }
    </style>
</head>
<body>
    <h1>🏆 Family World Cup 2026 Prediction Pool</h1>
    <p style="text-align:center; color:#006400;"><strong>Live Shared Version</strong></p>

    <div class="tab">
        <button class="active" onclick="openTab(0)">1. Players & Add Matches</button>
        <button onclick="openTab(1)">2. My Predictions</button>
        <button onclick="openTab(2)">3. Leaderboard</button>
    </div>

    <div id="tab0" class="content active">
        <div class="instructions">
            <strong>Add family members + New Matches (Admin)</strong><br>
            Use the button below to add future matches
        </div>
        <input type="text" id="newPlayer" placeholder="Enter name">
        <button onclick="addPlayer()">Add Player</button>
        <button onclick="addNewMatch()">+ Add New Match</button>
        <table id="playersTable"></table>
    </div>

    <div id="tab1" class="content">
        <div class="instructions"><strong>Select your name → Predict</strong></div>
        <select id="currentPlayer" onchange="loadPlayerPredictions()"></select>
        <div id="matchesList"></div>
    </div>

    <div id="tab2" class="content">
        <div class="instructions"><strong>Leaderboard — Update actual scores here</strong><br>
            3 pts correct winner/draw + 2 pts exact score</div>
        <table id="leaderboardTable"></table>
    </div>

    <script>
        // ==================== YOUR FIREBASE CONFIG ====================
         // Your web app's Firebase configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDDy4VXUPWiOOZHZ2eiIt3qRVRgvjeET3E",
                authDomain: "family-world-cup-2026-pool.firebaseapp.com",
                databaseURL: "https://family-world-cup-2026-pool-default-rtdb.firebaseio.com",
                projectId: "family-world-cup-2026-pool",
                storageBucket: "family-world-cup-2026-pool.firebasestorage.app",
                messagingSenderId: "615728714468",
                appId: "1:615728714468:web:baa9835731188b334392f1"
            };

        // ============================================================

        let app, db;
        let players = [];
        let matches = [];
        let predictions = {};

        function initFirebase() {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            loadFromFirebase();
        }

        function loadFromFirebase() {
            db.ref('players').on('value', (snap) => {
                players = snap.val() || [];
                renderPlayers();
            });

            db.ref('matches').once('value', (snap) => {
                if (!snap.exists() || !snap.val() || snap.val().length === 0) {
                    const defaultMatches = [
                        {id:1, team1:"Mexico", team2:"South Africa", date:"June 11", actual:""},
                        {id:2, team1:"Korea Republic", team2:"Czechia", date:"June 11", actual:""},
                        {id:3, team1:"Canada", team2:"Bosnia and Herzegovina", date:"June 12", actual:""},
                        {id:4, team1:"USA", team2:"Paraguay", date:"June 12", actual:""},
                        {id:5, team1:"Qatar", team2:"Switzerland", date:"June 13", actual:""},
                        {id:6, team1:"Brazil", team2:"Morocco", date:"June 13", actual:""}
                    ];
                    saveToFirebase('matches', defaultMatches);
                    matches = defaultMatches;
                } else {
                    matches = snap.val();
                }
            });

            db.ref('matches').on('value', (snap) => {
                if (snap.val()) matches = snap.val();
            });

            db.ref('predictions').on('value', (snap) => {
                predictions = snap.val() || {};
                if (document.getElementById('tab2').classList.contains('active')) calculateAndRenderLeaderboard();
            });
        }

        function saveToFirebase(path, data) {
            db.ref(path).set(data);
        }

        function renderPlayers() {
            const tbody = document.getElementById('playersTable');
            tbody.innerHTML = `<tr><th>Family Members</th><th>Action</th></tr>`;
            players.forEach((p, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${p}</td><td><button onclick="removePlayer(${i})">Remove</button></td>`;
                tbody.appendChild(row);
            });
            renderPlayerSelect();
        }

        function renderPlayerSelect() {
            const select = document.getElementById('currentPlayer');
            select.innerHTML = '<option value="">Select your name</option>';
            players.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.textContent = p;
                select.appendChild(opt);
            });
        }

        function addPlayer() {
            const name = document.getElementById('newPlayer').value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                saveToFirebase('players', players);
            }
        }

        function removePlayer(i) {
            if (confirm("Remove this player?")) {
                players.splice(i, 1);
                saveToFirebase('players', players);
            }
        }

        function addNewMatch() {
            const team1 = prompt("Enter Team 1 name:");
            const team2 = prompt("Enter Team 2 name:");
            const date = prompt("Enter date (e.g. June 15):", "June 15");
            if (team1 && team2 && date) {
                const newId = matches.length > 0 ? Math.max(...matches.map(m => m.id)) + 1 : 1;
                matches.push({id: newId, team1: team1.trim(), team2: team2.trim(), date: date.trim(), actual: ""});
                saveToFirebase('matches', matches);
                alert("✅ New match added!");
            }
        }

        function loadPlayerPredictions() {
            const player = document.getElementById('currentPlayer').value;
            if (!player) return;
            renderMatchesForPlayer(player);
        }

        function renderMatchesForPlayer(player) {
            const list = document.getElementById('matchesList');
            list.innerHTML = `<h3>Predictions for ${player}</h3>`;
            matches.forEach((m) => {
                const playerPred = (predictions[player] && predictions[player][m.id]) || {};
                const div = document.createElement('div');
                div.className = 'match';
                div.innerHTML = `
                    <strong>${m.team1} vs ${m.team2}</strong> (${m.date})<br>
                    <select onchange="savePrediction('${player}', ${m.id}, 'winner', this.value)">
                        <option value="">Pick winner / draw</option>
                        <option value="${m.team1}" ${playerPred.winner === m.team1 ? 'selected' : ''}>${m.team1} wins</option>
                        <option value="Draw" ${playerPred.winner === 'Draw' ? 'selected' : ''}>Draw</option>
                        <option value="${m.team2}" ${playerPred.winner === m.team2 ? 'selected' : ''}>${m.team2} wins</option>
                    </select>
                    <input type="text" value="${playerPred.score || ''}" placeholder="Exact score (e.g. 2-1)" 
                           onchange="savePrediction('${player}', ${m.id}, 'score', this.value)">
                    <div style="margin-top:8px; color:#006400;">
                        Actual: <input type="text" value="${m.actual || ''}" placeholder="e.g. 2-0" 
                                       onchange="updateActual(${m.id}, this.value)" style="width:100px;">
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function savePrediction(player, matchId, field, value) {
            if (!predictions[player]) predictions[player] = {};
            if (!predictions[player][matchId]) predictions[player][matchId] = {};
            predictions[player][matchId][field] = value;
            saveToFirebase('predictions', predictions);
        }

        function updateActual(matchId, score) {
            const match = matches.find(m => m.id === matchId);
            if (match) {
                match.actual = score.trim();
                saveToFirebase('matches', matches);
                calculateAndRenderLeaderboard();
            }
        }

        // Scoring functions (same as before)
        function parseScore(scoreStr) {
            if (!scoreStr) return null;
            const parts = scoreStr.split('-').map(s => parseInt(s.trim()));
            return (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) ? parts : null;
        }

        function calculatePoints(playerPred, actualScoreStr, match) {
            if (!playerPred.winner || !actualScoreStr) return 0;
            const actualGoals = parseScore(actualScoreStr);
            if (!actualGoals) return 0;

            const actualHome = actualGoals[0];
            const actualAway = actualGoals[1];
            const actualOutcome = actualHome > actualAway ? match.team1 : (actualHome < actualAway ? match.team2 : "Draw");

            let points = 0;
            if ((playerPred.winner === match.team1 && actualOutcome === match.team1) ||
                (playerPred.winner === match.team2 && actualOutcome === match.team2) ||
                (playerPred.winner === "Draw" && actualOutcome === "Draw")) {
                points += 3;
            }

            const predGoals = parseScore(playerPred.score);
            if (predGoals && predGoals[0] === actualHome && predGoals[1] === actualAway) {
                points += 2;
            }
            return points;
        }

        function calculateAndRenderLeaderboard() {
            const tbody = document.getElementById('leaderboardTable');
            tbody.innerHTML = `<tr><th>Rank</th><th>Player</th><th>Points</th></tr>`;

            const playerPoints = players.map(player => {
                let total = 0;
                if (predictions[player]) {
                    Object.keys(predictions[player]).forEach(mid => {
                        const pred = predictions[player][mid];
                        const match = matches.find(m => m.id == mid);
                        if (match && match.actual) {
                            total += calculatePoints(pred, match.actual, match);
                        }
                    });
                }
                return {player, points: total};
            });

            playerPoints.sort((a, b) => b.points - a.points);

            playerPoints.forEach((entry, rank) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${rank + 1}</td><td>${entry.player}</td><td style="font-weight:bold; color:#006400;">${entry.points}</td>`;
                tbody.appendChild(row);
            });
        }

        function openTab(n) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('.tab button').forEach((b, i) => b.classList.toggle('active', i === n));
            if (n === 1) loadPlayerPredictions();
            if (n === 2) calculateAndRenderLeaderboard();
        }

        window.onload = function() {
            initFirebase();
            renderPlayers();
            calculateAndRenderLeaderboard();
        };
    </script>
</body>
</html>
